<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RUNNING</title>
  <style>
    body { font-family: monospace; margin: 1em; background: #1e1e1e; color: #d4d4d4; }
    .pass { color: #4ec9b0; }
    .fail { color: #f44747; }
    #summary { font-size: 1.4em; margin-top: 1em; font-weight: bold; }
  </style>
</head>
<body>
  <h2>OPFS Integration Tests</h2>
  <div id="log"></div>
  <div id="summary"></div>

  <script type="module">
    const logEl = document.getElementById("log");
    const summaryEl = document.getElementById("summary");

    function appendLog(msg, cls) {
      const div = document.createElement("div");
      div.textContent = msg;
      if (cls) div.className = cls;
      logEl.appendChild(div);
    }

    // ── Create shared buffers ────────────────────────────────────
    const CMD_SLOTS = 16;
    const cmdBuf = new SharedArrayBuffer(CMD_SLOTS * 4);
    const strBuf = new SharedArrayBuffer(64 * 1024);
    const dataBuf = new SharedArrayBuffer(4 * 1024 * 1024);
    const errBuf = new SharedArrayBuffer(4 * 1024);

    new Int32Array(cmdBuf)[0] = 0; // S_IDLE

    // ── Create helper worker (sibling to WASM worker) ────────────
    const helperWorker = new Worker("tests/opfs/helper.js");
    helperWorker.postMessage({
      type: "init",
      cmd: cmdBuf, str: strBuf, data: dataBuf, err: errBuf,
    });

    // Give helper a moment to initialize before starting WASM worker
    await new Promise(r => setTimeout(r, 100));

    // ── Create WASM worker ───────────────────────────────────────
    const wasmWorker = new Worker("tests/opfs/worker.js", { type: "module" });

    // Send shared buffers to WASM worker
    wasmWorker.postMessage({
      type: "init",
      cmd: cmdBuf, str: strBuf, data: dataBuf, err: errBuf,
    });

    wasmWorker.onmessage = (e) => {
      const { type, name, error, results } = e.data;

      if (type === "test_result") {
        if (error) {
          appendLog(`FAIL: ${name} — ${error}`, "fail");
        } else {
          appendLog(`PASS: ${name}`, "pass");
        }
      } else if (type === "done") {
        const total = results.length;
        const passed = results.filter((r) => r.passed).length;
        const failed = total - passed;
        const allPassed = failed === 0;

        summaryEl.textContent = allPassed
          ? `ALL PASSED (${total}/${total})`
          : `FAILED (${passed}/${total} passed, ${failed} failed)`;
        summaryEl.className = allPassed ? "pass" : "fail";
        document.title = allPassed ? "PASS" : "FAIL";
      } else if (type === "log") {
        appendLog(e.data.msg);
      }
    };

    wasmWorker.onerror = (e) => {
      const detail = e.message || e.filename || JSON.stringify(e);
      appendLog(`Worker error: ${detail}`, "fail");
      if (e.filename) appendLog(`  file: ${e.filename}:${e.lineno}:${e.colno}`, "fail");
      summaryEl.textContent = "FAILED (worker error)";
      summaryEl.className = "fail";
      document.title = "FAIL";
    };
  </script>
</body>
</html>
